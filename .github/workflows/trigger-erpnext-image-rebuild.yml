name: Trigger ERPNext Image Rebuild

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger qi-brindes-erpnext image rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ERP_IMAGE_REBUILD_TOKEN }}
          repository: Strategitech/qi-brindes-erpnext
          event-type: custom-app-updated
          client-payload: >-
            {
              "app_repository": "${{ github.repository }}",
              "app_sha": "${{ github.sha }}",
              "app_ref": "${{ github.ref_name }}",
              "triggered_by": "${{ github.actor }}"
            }
